name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: support_tickets_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: support
          MYSQL_PASSWORD: support123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3.12-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, bcmath, gd, zip, amqp
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Configure .env for CI
        working-directory: backend
        run: |
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=support_tickets_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=support/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=support123/' .env
          echo "RABBITMQ_HOST=127.0.0.1" >> .env
          echo "RABBITMQ_PORT=5672" >> .env
          echo "RABBITMQ_USER=guest" >> .env
          echo "RABBITMQ_PASSWORD=guest" >> .env
          echo "RABBITMQ_VHOST=/" >> .env

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run Unit Tests
        working-directory: backend
        run: php artisan test --testsuite=Unit

      - name: Run Feature Tests
        working-directory: backend
        run: php artisan test --testsuite=Feature
