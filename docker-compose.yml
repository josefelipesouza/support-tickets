services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - support_network
    depends_on:
      - mysql
      - rabbitmq

  nginx:
    image: nginx:alpine
    container_name: support_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - support_network
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - support_network

  mysql:
    image: mysql:8.0
    container_name: support_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: support_tickets
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: support
      MYSQL_PASSWORD: support123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - support_network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: support_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - support_network

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: php artisan queue:work --sleep=3 --tries=3
    networks:
      - support_network
    depends_on:
      - app
      - rabbitmq

networks:
  support_network:
    driver: bridge

volumes:
  mysql_data: